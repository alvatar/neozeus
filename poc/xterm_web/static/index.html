<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>neozeus :: xterm.js PoC</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/css/xterm.css" />
    <style>
      html, body {
        margin: 0;
        width: 100%;
        height: 100%;
        background: #0b0b0b;
        color: #ddd;
        font-family: system-ui, sans-serif;
      }

      #layout {
        display: grid;
        grid-template-rows: auto 1fr;
        width: 100%;
        height: 100%;
      }

      #toolbar {
        padding: 10px 14px;
        border-bottom: 1px solid #222;
        background: #111;
        font-size: 14px;
      }

      #terminal {
        width: 100%;
        height: 100%;
        padding: 10px;
        box-sizing: border-box;
      }

      .status {
        color: #8bc48b;
      }
    </style>
  </head>
  <body>
    <div id="layout">
      <div id="toolbar">
        <strong>PoC B</strong> — xterm.js frontend in the browser. <span class="status">Open a shell, run TUIs, resize the browser.</span>
      </div>
      <div id="terminal"></div>
    </div>

    <script type="module">
      import { Terminal } from 'https://esm.sh/@xterm/xterm@5.5.0?bundle';
      import { FitAddon } from 'https://esm.sh/@xterm/addon-fit@0.10.0?bundle';

      const term = new Terminal({
        cursorBlink: true,
        convertEol: false,
        allowProposedApi: false,
        fontFamily: 'JetBrains Mono, Menlo, Consolas, monospace',
        fontSize: 15,
        theme: {
          background: '#0b0b0b',
          foreground: '#dddddd',
          cursor: '#8bc48b'
        }
      });

      const fitAddon = new FitAddon();
      term.loadAddon(fitAddon);
      term.open(document.getElementById('terminal'));
      fitAddon.fit();
      term.focus();

      const protocol = window.location.protocol === 'https:' ? 'wss' : 'ws';
      const socket = new WebSocket(`${protocol}://${window.location.host}/ws`);
      socket.binaryType = 'arraybuffer';

      function send(message) {
        if (socket.readyState === WebSocket.OPEN) {
          socket.send(JSON.stringify(message));
        }
      }

      function sendResize() {
        fitAddon.fit();
        send({ type: 'resize', cols: term.cols, rows: term.rows });
      }

      socket.addEventListener('open', () => {
        sendResize();
      });

      socket.addEventListener('message', async (event) => {
        if (typeof event.data === 'string') {
          try {
            const message = JSON.parse(event.data);
            if (message.type === 'status') {
              console.log(message.message);
            }
          } catch {
            term.writeln(event.data);
          }
          return;
        }

        const buffer = event.data instanceof ArrayBuffer
          ? event.data
          : await event.data.arrayBuffer();
        term.write(new Uint8Array(buffer));
      });

      socket.addEventListener('close', () => {
        term.writeln('\r\n[connection closed]');
      });

      term.onData((data) => {
        send({ type: 'input', data });
      });

      window.addEventListener('resize', sendResize);
    </script>
  </body>
</html>
